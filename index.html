<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Flashcards PRO</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .screen {
      display: none;
      text-align: center;
      width: 400px;
    }

    .active { display: block; }

    h1 { margin-bottom: 20px; }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: #00c6ff;
      color: black;
      cursor: pointer;
      margin: 10px;
      font-weight: bold;
    }

    .card {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 15px;
      margin: 20px 0;
      min-height: 80px;
    }

    input {
      padding: 10px;
      width: 80%;
      border-radius: 8px;
      border: none;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
    }
  </style>
</head>
<body>

<!-- MENU -->
<div id="menu" class="screen active">
  <h1>🎮 Flashcards PRO</h1>
  <button onclick="startGame()">Jugar</button>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div class="top-bar">
    <span id="nivel"></span>
    <span id="vidas"></span>
  </div>

  <div class="card" id="pregunta"></div>

  <input type="text" id="respuesta" placeholder="Tu respuesta">
  <br>
  <button onclick="verificar()">Responder</button>

  <p id="mensaje"></p>
</div>

<!-- FINAL -->
<div id="final" class="screen">
  <h1 id="resultado"></h1>
  <button onclick="restart()">Reintentar</button>
</div>

<script>
let preguntas = [];
let nivel = 0;
let vidas = 3;

fetch('flashcards.csv')
  .then(r => r.text())
  .then(data => {
    preguntas = data.split('\n').map(l => {
      let partes = l.split(',');
let p = partes[0];
let r = partes.slice(1).join(','); // une todo lo demás
return { p, r };      return { p, r };
    });

    preguntas = shuffle(preguntas);
  });

function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

function startGame() {
  document.getElementById('menu').classList.remove('active');
  document.getElementById('game').classList.add('active');
  mostrar();
}

function mostrar() {
  if (nivel >= 6) return win();
  if (vidas <= 0) return lose();

  document.getElementById('nivel').innerText = `Nivel ${nivel+1}/6`;
  document.getElementById('vidas').innerText = `❤️ ${vidas}`;
  document.getElementById('pregunta').innerText = preguntas[nivel].p;
}
function normalizar(texto) {
  return texto
    .toLowerCase()
    .trim()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/\r/g, "");
}

// Distancia de Levenshtein (errores tipo "pariz")
function similitud(a, b) {
  const matrix = [];

  for (let i = 0; i <= b.length; i++) matrix[i] = [i];
  for (let j = 0; j <= a.length; j++) matrix[0][j] = j;

  for (let i = 1; i <= b.length; i++) {
    for (let j = 1; j <= a.length; j++) {
      if (b.charAt(i - 1) === a.charAt(j - 1)) {
        matrix[i][j] = matrix[i - 1][j - 1];
      } else {
        matrix[i][j] = Math.min(
          matrix[i - 1][j - 1] + 1,
          matrix[i][j - 1] + 1,
          matrix[i - 1][j] + 1
        );
      }
    }
  }

  let distancia = matrix[b.length][a.length];
  let maxLen = Math.max(a.length, b.length);
  return 1 - distancia / maxLen;
}
function verificar() {
  let user = normalizar(document.getElementById('respuesta').value);

  let respuestas = preguntas[nivel].r
    .split('|')
    .map(r => normalizar(r));

  let esCorrecto = respuestas.some(correct => {
    let score = similitud(user, correct);
    return (
      user === correct ||        // exacto
      user.includes(correct) || // parcial
      score > 0.7               // parecido
    );
  });

  if (esCorrecto) {
    nivel++;
    document.getElementById('mensaje').innerText = '✅ Correcto';
  } else {
    vidas--;
    document.getElementById('mensaje').innerText = '❌ Incorrecto';
  }

  document.getElementById('respuesta').value = '';
  setTimeout(mostrar, 800);
}function win() {
  document.getElementById('game').classList.remove('active');
  document.getElementById('final').classList.add('active');
  document.getElementById('resultado').innerText = '🎉 GANASTE';
}

function lose() {
  document.getElementById('game').classList.remove('active');
  document.getElementById('final').classList.add('active');
  document.getElementById('resultado').innerText = '💀 PERDISTE';
}

function restart() {
  nivel = 0;
  vidas = 3;
  preguntas = shuffle(preguntas);

  document.getElementById('final').classList.remove('active');
  document.getElementById('game').classList.add('active');

  mostrar();
}
</script>

</body>
</html>
