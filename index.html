<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Flashcards PRO - Logística</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .screen { display: none; text-align: center; width: 450px; }
    .active { display: block; }
    h1 { margin-bottom: 20px; }
    button {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: #00c6ff;
      color: black;
      cursor: pointer;
      margin: 10px;
      font-weight: bold;
      transition: 0.2s;
    }
    button:hover { background: #00a8d6; }
    .card {
      background: white;
      color: black;
      padding: 30px;
      border-radius: 15px;
      margin: 20px 0;
      min-height: 100px;
      font-size: 18px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1.4;
    }
    input { padding: 10px; width: 80%; border-radius: 8px; border: none; outline: none; }
    .top-bar { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 10px; }
    #mensaje { height: 20px; font-weight: bold; }
  </style>
</head>
<body>

<div id="menu" class="screen active">
  <h1>🎮 Flashcards Logística</h1>
  <p id="status">Cargando preguntas...</p>
  <button onclick="startGame()">Jugar</button>
</div>

<div id="game" class="screen">
  <div class="top-bar">
    <span id="nivel"></span>
    <span id="vidas"></span>
  </div>
  <div class="card" id="pregunta"></div>
  <input type="text" id="respuesta" placeholder="Tu respuesta">
  <br>
  <button onclick="verificar()">Responder</button>
  <p id="mensaje"></p>
</div>

<div id="final" class="screen">
  <h1 id="resultado"></h1>
  <button onclick="restart()">Reintentar</button>
</div>

<script>
let preguntas = [];
let nivel = 0;
let vidas = 3;
let cargado = false;

// CARGA DE DATOS
fetch('./flashcards.csv')
  .then(r => r.text())
  .then(data => {
    preguntas = data.split('\n')
      .filter(linea => linea.trim().includes(';'))
      .map(l => {
        let lastIndex = l.lastIndexOf(';');
        let p = l.substring(0, lastIndex).trim().replace(/^["']|["']$/g, "");
        let r = l.substring(lastIndex + 1).trim().replace(/^["']|["']$/g, "");
        return { p, r };
      });

    if (preguntas.length > 0) {
      preguntas = shuffle(preguntas);
      cargado = true;
      document.getElementById('status').innerText = "✅ Preguntas listas";
    }
  })
  .catch(err => {
    document.getElementById('status').innerText = "❌ Error al cargar CSV";
  });

function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

function startGame() {
  if (!cargado) return alert("Espera a que carguen las preguntas");
  document.getElementById('menu').classList.remove('active');
  document.getElementById('game').classList.add('active');
  mostrar();
}

function mostrar() {
  if (nivel >= preguntas.length) return win();
  if (vidas <= 0) return lose();
  document.getElementById('nivel').innerText = `Pregunta ${nivel+1}/${preguntas.length}`;
  document.getElementById('vidas').innerText = `❤️ ${vidas}`;
  document.getElementById('pregunta').innerText = preguntas[nivel].p;
  document.getElementById('mensaje').innerText = '';
  document.getElementById('respuesta').focus();
}

function normalizar(t) {
  return t.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\r/g, "");
}

function similitud(a, b) {
  const m = [];
  for (let i = 0; i <= b.length; i++) m[i] = [i];
  for (let j = 0; j <= a.length; j++) m[0][j] = j;
  for (let i = 1; i <= b.length; i++) {
    for (let j = 1; j <= a.length; j++) {
      if (b.charAt(i - 1) === a.charAt(j - 1)) m[i][j] = m[i - 1][j - 1];
      else m[i][j] = Math.min(m[i - 1][j - 1] + 1, m[i][j - 1] + 1, m[i - 1][j] + 1);
    }
  }
  return 1 - m[b.length][a.length] / Math.max(a.length, b.length);
}

function verificar() {
  let user = normalizar(document.getElementById('respuesta').value);
  let correctas = preguntas[nivel].r.split('|').map(r => normalizar(r));
  
  let esCorrecto = correctas.some(c => user === c || user.includes(c) || similitud(user, c) > 0.7);

  if (esCorrecto) {
    nivel++;
    document.getElementById('mensaje').style.color = "#00ff00";
    document.getElementById('mensaje').innerText = '✅ ¡Bien!';
  } else {
    vidas--;
    document.getElementById('mensaje').style.color = "#ff4d4d";
    document.getElementById('mensaje').innerText = `❌ Era: ${preguntas[nivel].r}`;
  }
  document.getElementById('respuesta').value = '';
  setTimeout(mostrar, 1500);
}

function win() {
  document.getElementById('game').classList.remove('active');
  document.getElementById('final').classList.add('active');
  document.getElementById('resultado').innerText = '🎉 ¡Completado!';
}

function lose() {
  document.getElementById('game').classList.remove('active');
  document.getElementById('final').classList.add('active');
  document.getElementById('resultado').innerText = '💀 Juego Terminado';
}

function restart() {
  nivel = 0; vidas = 3; preguntas = shuffle(preguntas);
  document.getElementById('final').classList.remove('active');
  document.getElementById('game').classList.add('active');
  mostrar();
}

document.getElementById('respuesta').addEventListener('keypress', (e) => { if (e.key === 'Enter') verificar(); });
</script>
</body>
</html>
